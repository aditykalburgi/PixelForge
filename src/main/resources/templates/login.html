<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PixelForge Nexus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(15, 12, 41, 0.95);
            border: 2px solid #6200ea;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .login-card h1 {
            text-align: center;
            color: #6200ea;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #b0b0b0;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(98, 0, 234, 0.1);
            border: 1px solid #6200ea;
            border-radius: 4px;
            color: #e0e0e0;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(98, 0, 234, 0.2);
            border-color: #7c3aed;
            box-shadow: 0 0 8px rgba(98, 0, 234, 0.3);
        }

        .alert {
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border-left: 4px solid #f44336;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: #6200ea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .login-button:hover {
            background: #7c3aed;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(98, 0, 234, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .demo-creds {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(98, 0, 234, 0.2);
            font-size: 12px;
            color: #888;
        }

        .demo-creds p {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .logout-message {
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border-left: 4px solid #4caf50;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>PixelForge Nexus</h1>

        <div th:if="${param.logout}" class="logout-message">
            You have been successfully logged out.
        </div>

        <div th:if="${param.error}" class="alert">
            Invalid username or password. Please try again.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="login-button">Login</button>
        </form>

        <div class="demo-creds">
            <p><strong>Demo Credentials:</strong></p>
            <p>Admin: admin / Admin123!</p>
            <p>Lead: lead1 / Lead123!</p>
            <p>Dev: dev1 / Dev123!</p>
        </div>
    </div>
</body>
</html>
